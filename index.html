<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Birthday Input Component</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0ede8;
    font-family: 'DM Sans', sans-serif;
  }
  .demo-container {
    width: 80vw;
    max-width: 900px;
    padding: 24px;
  }
  .demo-container h2 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(28px, 4vw, 48px);
    color: #1a1714;
    margin-bottom: 8px;
    font-weight: 400;
  }
  .demo-container p {
    color: #7a746b;
    font-size: clamp(14px, 2vw, 20px);
    margin-bottom: 24px;
  }
  .result-display {
    margin-top: 20px;
    padding: 20px 24px;
    background: #1a1714;
    border-radius: 16px;
    color: #f0ede8;
    font-family: 'DM Mono', monospace;
    font-size: clamp(14px, 2vw, 20px);
    display: none;
  }
  .result-display.visible { display: block; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif&display=swap" rel="stylesheet">
</head>
<body>

<div class="demo-container">
  <h2>When's your birthday?</h2>
  <p>We'll start with the year — swipe to find your decade.</p>
  <birthday-picker id="bp"></birthday-picker>
  <div class="result-display" id="result"></div>
</div>

<script type="module">
import { LitElement, html, css } from 'https://esm.sh/lit@3.1.2';

class BirthdayPicker extends LitElement {
  static properties = {
    // Public API
    showAge: { type: Boolean, attribute: 'show-age' },
    // Internal state
    step: { type: String, state: true },
    decadeStart: { type: Number, state: true },
    selectedYear: { type: Number, state: true },
    selectedMonth: { type: Number, state: true },
    selectedDay: { type: Number, state: true },
    monthExpanded: { type: Boolean, state: true },
    _touchStartX: { type: Number, state: true },
    _swipeOffset: { type: Number, state: true },
    _isSwiping: { type: Boolean, state: true },
  };

  static styles = css`
    :host {
      display: block;
      font-family: 'DM Sans', sans-serif;
      --bg: #fff;
      --fg: #1a1714;
      --muted: #a09a90;
      --accent: #d35322;
      --accent-soft: #fef0e8;
      --border: #e5e1da;
      --radius: 16px;
      --touch-min: 56px;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      background: var(--bg);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06), 0 12px 40px rgba(0,0,0,0.06);
    }

    /* ===== HEADER ===== */
    .header {
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .header-label {
      font-size: clamp(14px, 1.8vw, 20px);
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .header-value {
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 600;
      color: var(--fg);
      font-family: 'DM Mono', monospace;
    }
    .header-back {
      background: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: clamp(15px, 1.8vw, 20px);
      color: var(--fg);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      min-height: var(--touch-min);
      display: flex;
      align-items: center;
    }
    .header-back:active {
      background: var(--border);
    }
    .header-month {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: clamp(15px, 1.8vw, 20px);
      color: white;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      min-height: var(--touch-min);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
    }
    .header-month:active {
      transform: scale(0.97);
      opacity: 0.85;
    }
    .header-month-arrow {
      font-size: clamp(12px, 1.4vw, 16px);
      opacity: 0.7;
    }

    /* ===== YEAR STEP ===== */
    .year-step { padding: 0; }

    .decade-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 28px 12px;
    }
    .decade-label {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(28px, 4vw, 48px);
      color: var(--fg);
      font-weight: 400;
      min-width: 140px;
      text-align: center;
    }
    .nav-btn {
      width: clamp(52px, 6vw, 72px);
      height: clamp(52px, 6vw, 72px);
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: clamp(22px, 3vw, 32px);
      color: var(--fg);
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .nav-btn:active {
      background: var(--border);
      transform: scale(0.93);
    }
    .nav-btn[disabled] {
      opacity: 0.3;
      pointer-events: none;
    }

    .decade-swipe-area {
      position: relative;
      overflow: hidden;
      touch-action: pan-y;
      padding: 12px 24px 24px;
    }

    .decade-page {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: clamp(8px, 1.2vw, 16px);
    }

    .year-btn {
      padding: clamp(16px, 2.5vw, 32px) 8px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: clamp(18px, 2.5vw, 28px);
      color: var(--fg);
      cursor: pointer;
      transition: all 0.12s;
      text-align: center;
      min-height: clamp(60px, 8vw, 88px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .year-btn:active {
      transform: scale(0.95);
      background: var(--accent-soft);
      border-color: var(--accent);
    }
    .year-btn.future {
      opacity: 0.2;
      pointer-events: none;
    }

    .swipe-hint {
      text-align: center;
      font-size: clamp(12px, 1.5vw, 16px);
      color: var(--muted);
      padding: 4px 0 8px;
    }
    .swipe-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 8px 0 16px;
    }
    .swipe-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.2s;
      cursor: pointer;
    }
    .swipe-dot.active {
      background: var(--accent);
      width: 24px;
      border-radius: 4px;
    }

    /* ===== MONTH+DAY STEP — wrapper ===== */
    .monthday-step {
      display: flex;
      overflow: hidden;
    }

    /* ===== MONTH GRID (expanded): full-width 3x4 ===== */
    .month-expanded {
      flex: 1 1 100%;
      padding: clamp(16px, 3vw, 32px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: clamp(10px, 1.5vw, 18px);
      transition: flex 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                  padding 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.3s ease;
    }

    .month-grid-btn {
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--bg);
      font-family: inherit;
      font-size: clamp(18px, 2.8vw, 28px);
      font-weight: 500;
      color: var(--fg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: clamp(64px, 10vw, 100px);
      transition: all 0.15s;
    }
    .month-grid-btn:active {
      transform: scale(0.95);
      background: var(--accent-soft);
      border-color: var(--accent);
    }
    .month-grid-btn.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 600;
    }

    /* Quarter labels */
    .quarter-label {
      grid-column: 1 / -1;
      font-size: clamp(11px, 1.2vw, 14px);
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 4px 0;
    }
    .month-expanded .quarter-label:first-child {
      padding-top: 0;
    }

    /* month-tab removed — month indicator now lives in header */

    /* ===== DAY PANEL ===== */
    .day-panel {
      flex: 0 0 0;
      overflow: hidden;
      padding: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: flex 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                  padding 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.3s ease 0.15s;
    }
    .day-panel.visible {
      flex: 1 1 auto;
      padding: clamp(16px, 2vw, 28px);
      opacity: 1;
    }

    .day-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 8px;
    }
    .day-header span {
      text-align: center;
      font-size: clamp(12px, 1.5vw, 17px);
      font-weight: 600;
      color: var(--muted);
      padding: 8px 0;
    }

    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: clamp(4px, 0.6vw, 8px);
      align-content: start;
    }

    .day-cell {
      aspect-ratio: 1;
      border-radius: 50%;
      border: none;
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: clamp(15px, 2vw, 22px);
      color: var(--fg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      min-width: clamp(40px, 5vw, 64px);
      min-height: clamp(40px, 5vw, 64px);
    }
    .day-cell:active {
      transform: scale(0.88);
    }
    .day-cell.selected {
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .day-cell.empty {
      pointer-events: none;
    }
    .day-cell:not(.selected):not(.empty):hover {
      background: var(--accent-soft);
    }
    .day-cell.today:not(.selected) {
      border: 2px solid var(--accent);
    }

    /* ===== RESULT BAR ===== */
    .result-bar {
      padding: 20px 28px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .result-date {
      font-family: 'DM Mono', monospace;
      font-size: clamp(16px, 2.2vw, 24px);
      color: var(--fg);
      font-weight: 500;
    }
    .result-age {
      font-size: clamp(14px, 2vw, 22px);
      color: var(--accent);
      font-weight: 600;
    }

    /* ===== ORIENTATION ===== */
    @media (orientation: portrait) {
      .decade-page {
        grid-template-columns: repeat(2, 1fr);
      }
      .year-btn {
        min-height: clamp(64px, 10vw, 100px);
        font-size: clamp(20px, 4vw, 32px);
      }
      .month-grid-btn {
        min-height: clamp(72px, 12vw, 110px);
        font-size: clamp(18px, 3.5vw, 30px);
      }
    }

    @media (orientation: landscape) {
      .decade-page {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    /* transitions */
    .fade-in {
      animation: fadeIn 0.25s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  `;

  constructor() {
    super();
    this.showAge = true;
    this.step = 'year';
    const currentYear = new Date().getFullYear();
    this.decadeStart = Math.floor((currentYear - 30) / 10) * 10;
    this.selectedYear = null;
    this.selectedMonth = null;
    this.selectedDay = null;
    this.monthExpanded = true;
    this._touchStartX = 0;
    this._swipeOffset = 0;
    this._isSwiping = false;
    this._minDecade = 1930;
    this._maxDecade = Math.floor(currentYear / 10) * 10;
  }

  get _currentYear() { return new Date().getFullYear(); }
  get _monthNames() {
    return ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
            'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  }
  get _monthFullNames() {
    return ['January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'];
  }
  get _dayNames() { return ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa']; }
  get _daysInMonth() {
    if (this.selectedYear == null || this.selectedMonth == null) return 0;
    return new Date(this.selectedYear, this.selectedMonth + 1, 0).getDate();
  }
  get _firstDayOfWeek() {
    if (this.selectedYear == null || this.selectedMonth == null) return 0;
    return new Date(this.selectedYear, this.selectedMonth, 1).getDay();
  }
  get _isComplete() {
    return this.selectedYear != null && this.selectedMonth != null && this.selectedDay != null;
  }
  get _age() {
    if (!this._isComplete) return null;
    const today = new Date();
    let age = today.getFullYear() - this.selectedYear;
    const m = today.getMonth() - this.selectedMonth;
    if (m < 0 || (m === 0 && today.getDate() < this.selectedDay)) age--;
    return age;
  }
  get _formattedDate() {
    if (!this._isComplete) return '';
    return `${this.selectedYear}-${String(this.selectedMonth+1).padStart(2,'0')}-${String(this.selectedDay).padStart(2,'0')}`;
  }
  get _displayDate() {
    if (!this._isComplete) return '';
    return `${this._monthFullNames[this.selectedMonth]} ${this.selectedDay}, ${this.selectedYear}`;
  }

  _decades() {
    const d = [];
    for (let i = this._minDecade; i <= this._maxDecade; i += 10) d.push(i);
    return d;
  }
  _decadeIndex() { return this._decades().indexOf(this.decadeStart); }
  _goPrevDecade() { if (this.decadeStart > this._minDecade) this.decadeStart -= 10; }
  _goNextDecade() { if (this.decadeStart < this._maxDecade) this.decadeStart += 10; }
  _goToDecade(d) { this.decadeStart = d; }

  _onTouchStart(e) {
    this._touchStartX = e.touches[0].clientX;
    this._isSwiping = true;
    this._swipeOffset = 0;
  }
  _onTouchMove(e) {
    if (!this._isSwiping) return;
    this._swipeOffset = e.touches[0].clientX - this._touchStartX;
  }
  _onTouchEnd() {
    if (!this._isSwiping) return;
    this._isSwiping = false;
    if (this._swipeOffset > 60) this._goPrevDecade();
    else if (this._swipeOffset < -60) this._goNextDecade();
    this._swipeOffset = 0;
  }

  _selectYear(y) {
    this.selectedYear = y;
    this.selectedMonth = null;
    this.selectedDay = null;
    this.monthExpanded = true;
    this.step = 'monthday';
  }

  _selectMonthFromGrid(m) {
    this.selectedMonth = m;
    this.selectedDay = null;
    this.monthExpanded = false;
  }

  _selectMonthFromSidebar(m) {
    this.selectedMonth = m;
    const maxDay = new Date(this.selectedYear, m + 1, 0).getDate();
    if (this.selectedDay != null && this.selectedDay > maxDay) this.selectedDay = null;
  }

  _expandMonths() {
    this.monthExpanded = true;
  }

  _selectDay(d) {
    this.selectedDay = d;
    this._emitChange();
  }

  _emitChange() {
    if (!this._isComplete) return;
    this.dispatchEvent(new CustomEvent('birthday-selected', {
      detail: {
        year: this.selectedYear, month: this.selectedMonth + 1, day: this.selectedDay,
        date: new Date(this.selectedYear, this.selectedMonth, this.selectedDay),
        iso: this._formattedDate, age: this._age,
      },
      bubbles: true, composed: true,
    }));
  }

  _goBackToYear() {
    this.step = 'year';
    this.selectedMonth = null;
    this.selectedDay = null;
    this.monthExpanded = true;
  }

  /* ===== RENDER ===== */

  _renderYearStep() {
    const years = [];
    for (let i = 0; i < 10; i++) years.push(this.decadeStart + i);
    const decades = this._decades();
    const idx = this._decadeIndex();

    return html`
      <div class="year-step fade-in">
        <div class="decade-nav">
          <button class="nav-btn" @click=${this._goPrevDecade} ?disabled=${idx <= 0}>&#8249;</button>
          <span class="decade-label">${this.decadeStart}s</span>
          <button class="nav-btn" @click=${this._goNextDecade} ?disabled=${idx >= decades.length - 1}>&#8250;</button>
        </div>
        <div class="swipe-dots">
          ${decades.map((d, i) => html`
            <div class="swipe-dot ${i === idx ? 'active' : ''}" @click=${() => this._goToDecade(d)}></div>
          `)}
        </div>
        <div class="decade-swipe-area"
             @touchstart=${this._onTouchStart}
             @touchmove=${this._onTouchMove}
             @touchend=${this._onTouchEnd}>
          <div class="decade-page">
            ${years.map(y => html`
              <button class="year-btn ${y > this._currentYear ? 'future' : ''}"
                @click=${() => this._selectYear(y)}>${y}</button>
            `)}
          </div>
        </div>
        <div class="swipe-hint">&larr; swipe to change decade &rarr;</div>
      </div>
    `;
  }

  _renderMonthDayStep() {
    const expanded = this.monthExpanded;

    return html`
      <div class="monthday-step">

        <!-- EXPANDED: full 3x4 month grid -->
        ${expanded ? html`
          <div class="month-expanded fade-in">
            ${this._monthNames.map((name, i) => html`
              <button class="month-grid-btn ${this.selectedMonth === i ? 'selected' : ''}"
                @click=${() => this._selectMonthFromGrid(i)}>${name}</button>
            `)}
          </div>
        ` : null}

        <!-- Month indicator now in header -->

        <!-- DAY CALENDAR -->
        ${!expanded && this.selectedMonth != null ? html`
          <div class="day-panel visible">
            ${this._renderDayGrid()}
          </div>
        ` : null}

      </div>
    `;
  }

  _renderDayGrid() {
    const totalDays = this._daysInMonth;
    const firstDay = this._firstDayOfWeek;
    const today = new Date();
    const cells = [];
    for (let i = 0; i < firstDay; i++) cells.push(html`<div class="day-cell empty"></div>`);
    for (let d = 1; d <= totalDays; d++) {
      const isToday = d === today.getDate() && this.selectedMonth === today.getMonth() && this.selectedYear === today.getFullYear();
      const isSel = d === this.selectedDay;
      cells.push(html`
        <button class="day-cell ${isSel ? 'selected' : ''} ${isToday ? 'today' : ''}"
          @click=${() => this._selectDay(d)}>${d}</button>
      `);
    }
    return html`
      <div class="day-header">${this._dayNames.map(n => html`<span>${n}</span>`)}</div>
      <div class="day-grid fade-in">${cells}</div>
    `;
  }

  render() {
    return html`
      <div class="container">
        <div class="header">
          ${this.step === 'year'
            ? html`
                <span class="header-label">Step 1 &middot; Select Year</span>
                ${this.selectedYear != null ? html`<span class="header-value">${this.selectedYear}</span>` : null}
              `
            : html`
                <button class="header-back" @click=${this._goBackToYear}>&larr; ${this.selectedYear}</button>
                ${!this.monthExpanded && this.selectedMonth != null
                  ? html`<button class="header-month" @click=${this._expandMonths}>
                      ${this._monthFullNames[this.selectedMonth]}
                      <span class="header-month-arrow">&#9662;</span>
                    </button>`
                  : html`<span class="header-label">Select Month</span>`
                }
              `}
        </div>
        ${this.step === 'year' ? this._renderYearStep() : this._renderMonthDayStep()}
        ${this._isComplete ? html`
          <div class="result-bar fade-in">
            <span class="result-date">${this._displayDate}</span>
            ${this.showAge ? html`<span class="result-age">${this._age} years old</span>` : null}
          </div>
        ` : null}
      </div>
    `;
  }
}

customElements.define('birthday-picker', BirthdayPicker);

document.getElementById('bp').addEventListener('birthday-selected', (e) => {
  const r = document.getElementById('result');
  r.classList.add('visible');
  r.textContent = `Selected: ${e.detail.iso}  (age: ${e.detail.age})`;
});
</script>

</body>
</html>
